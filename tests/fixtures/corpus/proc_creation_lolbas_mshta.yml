title: MSHTA Running Script from Remote URL
id: d1fa9b7c-4e6d-6d7f-be5a-a9b4c5d6e7f8
status: test
description: Detects MSHTA executing scripts from remote URLs
author: LOLBAS Project
date: 2024-03-05
tags:
  - attack.defense_evasion
  - attack.t1218.005
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith: '\mshta.exe'
  selection_url:
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'ftp://'
  condition: selection_image and selection_url
falsepositives:
  - Legitimate use of MSHTA with remote content
level: high
