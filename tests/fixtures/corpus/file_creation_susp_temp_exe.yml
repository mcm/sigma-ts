title: Executable Created in Temp Folder
id: e2ab0c8d-5f7e-7e8a-cf6b-b0c5d6e7f8a9
status: experimental
description: Detects executables being created in temporary directories
author: File Monitor
date: 2024-01-30
tags:
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: file_creation
  product: windows
detection:
  selection:
    TargetFilename|contains:
      - '\Temp\'
      - '\AppData\Local\Temp\'
    TargetFilename|endswith:
      - '.exe'
      - '.dll'
      - '.bat'
      - '.ps1'
  condition: selection
falsepositives:
  - Legitimate installer processes
  - Software update mechanisms
level: low
