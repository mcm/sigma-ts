title: Suspicious PowerShell Command Line
id: a7cd6f49-3b1a-4a9f-8b2c-d5e6f1a2b3c4
status: test
description: Detects suspicious PowerShell command line patterns
references:
  - https://example.com/powershell-attacks
author: Test Author
date: 2024-01-15
modified: 2024-06-01
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - '-EncodedCommand'
      - '-Enc '
      - '-NoProfile'
      - '-NonInteractive'
  filter:
    ParentImage|endswith: '\svchost.exe'
  condition: selection and not filter
falsepositives:
  - Legitimate administrative scripts
level: medium
